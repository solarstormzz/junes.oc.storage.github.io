<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Sheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page {
      padding: 2.5rem 3rem;
      margin-top: 1.25rem;
    }
    @media (max-width: 640px) {
      .page { padding: 1.5rem 1.25rem; margin-top: 0.75rem; }
    }

    /* ── REF IMAGE: 5:4 ratio, full image always visible ── */
    .char-sheet:has(.char-ref-wrap[style*="block"]) {
      display: grid;
      grid-template-columns: 280px auto;
      grid-template-rows: auto auto;
      grid-template-areas:
        "basics ref"
        "overview overview";
      gap: 1.25rem;
      align-items: start;
    }

    .char-ref-wrap {
      grid-area: ref;
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      align-self: start;
      aspect-ratio: 5 / 4;
      width: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--surface);
    }

    .char-ref-wrap[style*="block"] {
      display: flex !important;
    }

    .char-ref {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .char-sheet:has(.char-ref-wrap[style*="block"]) .char-basics {
      grid-area: basics;
      width: 100%;
    }

    .char-sheet:has(.char-ref-wrap[style*="block"]) .char-overview {
      grid-area: overview;
    }

    @media (max-width: 820px) {
      .char-sheet:has(.char-ref-wrap[style*="block"]) {
        grid-template-columns: 1fr;
        grid-template-areas:
          "ref"
          "basics"
          "overview";
      }
      .char-ref-wrap {
        width: 100%;
      }
    }

    /* CHANGE 4: Edit button in nav */
    .char-nav-edit-btn {
      display: inline-flex;
      align-items: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-mid);
      text-decoration: none;
      padding: 0.3rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      cursor: pointer;
      white-space: nowrap;
    }

    .char-nav-edit-btn:hover {
      color: var(--ink);
      border-color: #b5afa6;
      background: var(--surface);
    }

    /* CHANGE 3: unified background+history block */
    .char-bg-history-block {
      display: block;
    }

    .char-bg-details {
      display: inline;
    }

    .char-bg-details summary {
      display: inline-flex;
      margin-top: 8px;
    }

    .char-bg-details[open] {
      display: block;
    }

    .char-bg-details[open] p,
    .char-bg-details[open] span {
      display: block;
      margin-top: 6px;
    }

    .char-bg-ellipsis {
      font-size: 0.83rem;
      color: var(--ink);
    }
  </style>
</head>
<body>

<!-- ===== CHARACTER NAV ===== -->
<nav class="char-nav">
  <a href="index.html" class="char-nav-back">Back</a>
  <div class="char-nav-tabs">
    <!-- CHANGE 4: Edit button -->
    <button id="char-page-edit-btn" class="char-nav-edit-btn">Edit</button>
    <a href="#info" class="char-nav-tab active">Info</a>
    <a href="#gallery" class="char-nav-tab">Gallery</a>
  </div>
</nav>

<!-- ===== INFO SECTION ===== -->
<div id="info" class="page">
  <div class="char-sheet">

    <!-- REF IMAGE — shown/hidden by script.js, locked to 5:4 with contain -->
    <div class="char-ref-wrap" style="display:none">
      <img class="char-ref" src="" alt="Character reference sheet" />
    </div>

    <!-- LEFT: BASICS -->
    <aside class="char-basics">

      <h1 class="char-name" id="char-name"></h1>
      <p class="char-fandom" id="char-fandom"></p>

      <table class="char-table">
        <tr>
          <td>Nicknames</td>
          <td id="char-nicknames"></td>
        </tr>
        <tr>
          <td>Pronouns</td>
          <td id="char-pronouns"></td>
        </tr>
        <tr>
          <td>Age</td>
          <td id="char-age"></td>
        </tr>
        <tr>
          <td>Birthday</td>
          <td id="char-birthday"></td>
        </tr>
        <tr>
          <td>Heritage</td>
          <td id="char-heritage"></td>
        </tr>
        <tr>
          <td>Occupation</td>
          <td id="char-occupation"></td>
        </tr>
      </table>

      <h2 class="char-section-heading">Appearance</h2>
      <!-- CHANGE 5: char-formatted class added by JS for pre-wrap -->
      <p class="char-body" id="char-appearance"></p>

      <h2 class="char-section-heading">Links</h2>
      <ul class="char-links" id="char-links-list">
        <li id="char-unvale-li"><a href="#" id="char-unvale">Unvale</a></li>
        <li id="char-characterhub-li"><a href="#" id="char-characterhub">CharacterHub</a></li>
        <li id="char-artfight-li"><a href="#" id="char-artfight">Artfight</a></li>
        <li id="char-spotify-li"><a href="#" id="char-spotify">Playlist</a></li>
      </ul>

    </aside>

    <!-- RIGHT: OVERVIEW -->
    <main class="char-overview">

      <h2 class="char-overview-heading">Overview</h2>
      <!-- CHANGE 5: char-formatted class added by JS -->
      <p class="char-body" style="margin-bottom: 20px;" id="char-overview"></p>

      <!-- CHANGE 3: Unified background + history block; populated by renderBackgroundHistory() -->
      <h2 class="char-overview-subheading">Background &amp; History</h2>
      <div id="char-bg-history-container"></div>

    </main>

  </div>
</div>

<!-- ===== GALLERY SECTION ===== -->
<section id="gallery">
  <h2 class="gallery-heading">Gallery</h2>
  <div class="gallery-grid">
    <!-- Populated by script.js -->
  </div>
</section>

<script src="script.js"></script>
<script>
  // Highlight active nav tab on scroll
  const tabs = document.querySelectorAll('.char-nav-tab');
  const sections = ['info', 'gallery'].map(id => document.getElementById(id));

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        tabs.forEach(t => t.classList.remove('active'));
        const active = document.querySelector(`.char-nav-tab[href="#${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { threshold: 0.35 });

  sections.forEach(s => { if (s) observer.observe(s); });
</script>

</body>
</html>
